<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLasswork / Day 47</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="container-header">
            <h1>Contact Form:</h1>
        </div>
        <div class="container-inputs">
            <form>
                <label for="txt">Your name</label>
                <br>
                <input type="text" id="txt" required>
                <br>
                <label for="email">Email Address</label>
                <br>
                <input required type="email" id="email">
                <br>
                <label for="txt2">Subject</label>
                <br>
                <input type="text" id="txt2" required>
                <br>
                <label for="txt3">Message</label>
                <br>
                <input type="text" id="txt3" required>
                <div class="container-button">
                    <button type="submit">Submit Form</button>
                </div>
            </form>
        </div>
        
    </div>
</body>
</html>
