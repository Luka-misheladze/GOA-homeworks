<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homework / Day 47</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="container-header">
            <h1>SIGNUP NOW</h1>
            <div class="container-header-txt">
                <h2>Creating an account is free</h2>
                <h3>and won't take longer than a couple of seconds.</h3>
            </div>
        </div>
        <div class="container-inputs">
            <form>
                <label for="txt1">Full Name</label>
                <input type="text" name="Fullname" id="txt1" required>
                <br>
                <label for="email1">Email Address</label>
                <input type="email" name="email" id="email1" required>
                <br>
                <label for="password1">Password</label>
                <input type="password" name="password" id="password1" required>
                <br>
                <label for="password2">Confirm Password</label>
                <input type="password" name="confirm password" id="password2" required>
                <div class="container-button">
                    <button type="submit">SIGNUP</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
