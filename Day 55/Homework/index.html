<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
    <title>Frontend Mentor | Results summary component</title>
	<link rel="stylesheet" href="style.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
	<div class="container">
		<div class="left-side">
			<p class="p-1">Your Result</p>
			<div class="round-div">
				<p class="round-p1">76</p>
				<p class="round-p2">of 100</p>
			</div>
			<div class="great-div">
				<h2 class="great-div-h2">Great</h2>
				<p class="great-p1">Your performance exceed 65% of the people conducting the test here!</p>
			</div>
		</div>
		<div class="right-side">
			<div class="summary">
				<p class="summary-p1">Summary</p>
			</div>
			<div id="box" class="box1">
				<div class="reaction">
					<img src="./assets/images/icon-reaction.svg" alt="icon-reaction"> <p class="reaction-p1">Reaction</p>
				</div>
				<div class="rating">
					<p><span class="rating-p1">80</span> <span class="rating-p2">/ 100</span></p>
				</div>
			</div>
			<div id="box" class="box2">
				<div class="memory">
					<img src="./assets/images/icon-memory.svg" alt="icon-memory"> <p class="memory-p1">Memory</p>
				</div>
				<div class="rating2">
					<p><span class="rating2-p1">92</span> <span class="rating2-p2">/ 100</span></p>
				</div>
			</div>
			<div id="box" class="box3">
				<div class="verbal">
					<img src="./assets/images/icon-verbal.svg" alt="icon-verbal"> <p class="verbal-p1">Verbal</p>
				</div>
				<div class="rating3">
					<p><span class="rating3-p1">61</span> <span class="rating3-p2">/ 100</span></p>
				</div>
			</div>
			<div id="box" class="box4">
				<div class="visual">
					<img src="./assets/images/icon-visual.svg" alt="icon-visual"> <p class="visual-p1">Visual</p>
				</div>
				<div class="rating4">
					<p><span class="rating4-p1">73</span> <span class="rating4-p2">/ 100</span></p>
				</div>
			</div>
			<div class="button">
				<button class="continue-btn">Continue</button>
			</div>
		</div>
	</div>
	<!-- Finished Project (Homework) -->
</body>
</html>
