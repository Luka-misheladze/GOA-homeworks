<!-- 5)შექმენით 5 par, 5 heading, 5 გასტილეთ rgb თი მეორე 5 hex -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homework / Day 34</title>
    <style>

        .rgb-h1 { 
            color: rgb(255, 0, 0); 
        }

        .rgb-h2 { 
            color: rgb(0, 128, 0); 
        }

        .rgb-h3 { 
            color: rgb(0, 0, 255); 
        }

        .rgb-p1 { 
            color: rgb(255, 165, 0); 
        }

        .rgb-p2 { 
            color: rgb(128, 0, 128); 
        }

        .hex-h1 { 
            color: #FF0000; 
        }

        .hex-h2 { 
            color: #00FF00; 
        }

        .hex-h3 { 
            color: #0000FF; 
        }

        .hex-p1 { 
            color: #FFFF00; 
        }

        .hex-p2 { 
            color: #000000; 
        }
    </style>
</head>
<body>
    <h1 class="rgb-h1">Heading 1</h1>
    <h2 class="rgb-h2">Heading 2</h2>
    <h3 class="rgb-h3">Heading 3</h3>

    <p class="rgb-p1">Paragraph 1</p>
    <p class="rgb-p2">Paragraph 2</p>

    <!-- HEX -->
    <h1 class="hex-h1">Heading 1</h1>
    <h2 class="hex-h2">Heading 2</h2>
    <h3 class="hex-h3">Heading 3</h3>

    <p class="hex-p1">Paragraph 1</p>
    <p class="hex-p2">Paragraph 2</p>
</body>
</html>
