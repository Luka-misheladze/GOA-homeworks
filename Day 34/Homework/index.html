<!-- 1)ახსენით რა არის rgb და hex და pixels -->
<!-- rgb შედგება სამი ფერისგან = red green blue -->

<!-- Example: -->
    <!-- rgb(225, 0, 0) ეს არის წითელი  -->
    <!-- rgb(0, 225, 0) ეს არის მწვანე -->
    <!-- rgb(0, 0, 225) ეს არის ლურჯი -->
    <!-- rgb(0, 0, 0) ეს არის შავი -->
    <!-- და rgb(225, 225, 225) არის თეთრი -->

<!-- HEX იგივე ფერის სისტემაა მაგრამ სხვანაირად იწერება -->
<!-- იწყება #- ით -->

<!-- Example: -->
    <!-- #FF0000 = წითელი -->
    <!-- #00FF00 = მწვანე -->
    <!-- #0000FF = ლურჯი -->
    <!-- #000000 = შავი -->
    <!-- #FFFFFF = თეთრი -->

ყველა სურათი და ვებსაიტი შედგება პიქსელებისგან. -->

<!-- Example: -->
    <!-- 100px = 100 პიქსელი -->
